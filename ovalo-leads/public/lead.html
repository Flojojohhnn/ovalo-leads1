<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead — Óvalo Leads</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0efeb;color:#1a1a1a;display:flex;flex-direction:column}

/* NAV */
.nav{background:#003087;display:flex;align-items:center;padding:0 16px;height:48px;flex-shrink:0;gap:12px}
.nav-back{color:rgba(255,255,255,0.6);font-size:13px;cursor:pointer;text-decoration:none;white-space:nowrap}
.nav-back:hover{color:#fff}
.nav-title{color:#fff;font-size:14px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.nav-score{display:flex;align-items:baseline;gap:3px}
.nav-score .n{color:#fff;font-size:20px;font-weight:800}
.nav-score .d{color:rgba(255,255,255,0.4);font-size:11px}
.nav-cl{font-size:11px;font-weight:700;padding:3px 8px;border-radius:5px}

/* LAYOUT */
.main{display:grid;grid-template-columns:420px 1fr;flex:1;overflow:hidden;min-height:0}

/* PANEL IZQUIERDO */
.panel{display:flex;flex-direction:column;background:#fafaf8;border-right:1px solid #e4e2dc;overflow:hidden}

/* LEAD HEADER */
.lead-hdr{padding:11px 14px;background:#fff;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.lead-hdr-left{display:flex;align-items:center;gap:10px}
.avatar{width:36px;height:36px;border-radius:50%;background:#003087;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.lead-nombre{font-size:14px;font-weight:700}
.lead-modelo{font-size:11px;color:#888;margin-top:1px}
.mgmt-btns{display:flex;gap:5px}
.mb{padding:4px 8px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid transparent;white-space:nowrap}
.mb-def{background:#f0efeb;color:#555;border-color:#ddd}
.mb-def:hover{background:#e4e2dc}
.mb-danger{background:#fff2f2;color:#c00;border-color:#fcc}
.mb-danger:hover{background:#ffe0e0}

/* TABS */
.tabs{display:flex;background:#fff;border-bottom:2px solid #eee;flex-shrink:0}
.tab{flex:1;padding:9px 4px;text-align:center;font-size:11px;font-weight:600;color:#aaa;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all 0.15s;user-select:none}
.tab:hover{color:#555}
.tab.active{color:#003087;border-bottom-color:#003087}

/* TAB CONTENT */
.tab-content{flex:1;overflow-y:auto;display:none}
.tab-content.active{display:block}

/* ── TAB 1: ACCIÓN ── */
.next-block{background:#003087;padding:13px 14px}
.nb-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:rgba(255,255,255,0.45);margin-bottom:6px}
.nb-canal{font-size:13px;font-weight:700;color:#fff;margin-bottom:5px}
.nb-objetivo{font-size:12px;color:rgba(255,255,255,0.78);line-height:1.45;margin-bottom:10px}
.msg-box{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:10px 12px}
.msg-box-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.msg-box-lbl{font-size:10px;color:rgba(255,255,255,0.45);font-weight:600;text-transform:uppercase;letter-spacing:0.05em}
.btn-copy-white{font-size:11px;font-weight:600;color:#003087;background:#fff;border:none;border-radius:5px;padding:3px 10px;cursor:pointer}
.btn-copy-white:hover{background:#e8eef7}
.msg-box-text{font-size:13px;color:#fff;line-height:1.5}

.spin-block{padding:12px 14px;border-bottom:1px solid #eee;background:#fff}
.sb-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:#bbb;margin-bottom:8px}
.spin-pills{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:8px}
.sp{border-radius:7px;padding:8px 4px;text-align:center;border:1.5px solid transparent}
.sp-ok{background:#e8f5e9;border-color:#a5d6a7}
.sp-falta{background:#fff8e1;border-color:#ffe082}
.sp-next{background:#fff3e0;border-color:#ffb74d}
.sp-letter{font-size:15px;font-weight:800}
.sp-ok .sp-letter{color:#2e7d32}
.sp-falta .sp-letter,.sp-next .sp-letter{color:#f57f17}
.sp-next .sp-letter{color:#e65100}
.sp-name{font-size:8px;color:#999;margin-top:1px}
.sp-icon{font-size:11px;margin-top:2px}
.next-step-box{background:#fff3e0;border-radius:7px;padding:9px 11px}
.nsb-title{font-size:11px;font-weight:700;color:#e65100;margin-bottom:3px}
.nsb-text{font-size:12px;color:#555;line-height:1.4}

.dias-chip{margin:10px 14px 0;display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px;background:#f0efeb;color:#666}

/* ── TAB 2: PERFIL ── */
.score-block{padding:12px 14px;border-bottom:1px solid #eee;background:#fff}
.score-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.score-big{font-size:40px;font-weight:900;line-height:1}
.score-hot{color:#e53935}.score-warm{color:#f57f17}.score-cold{color:#1565c0}.score-dead{color:#9e9e9e}
.cl-pill{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px}
.bar-row{display:grid;grid-template-columns:85px 1fr 22px;align-items:center;gap:7px;margin-bottom:4px}
.bar-label{font-size:11px;color:#777;text-align:right}
.bar-track{height:6px;background:#eee;border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width 0.5s}
.b0{background:#5c6bc0}.b1{background:#26a69a}.b2{background:#ef5350}.b3{background:#ab47bc}.b4{background:#66bb6a}
.bar-val{font-size:10px;color:#bbb;text-align:center}
.bar-nota{font-size:10px;color:#bbb;padding-left:93px;margin-bottom:5px;font-style:italic;line-height:1.3}

.diag-block{padding:12px 14px;border-bottom:1px solid #eee}
.blk-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:#bbb;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.updated-dot{width:6px;height:6px;border-radius:50%;background:#2e7d32;display:none}
.diag-text{font-size:12px;color:#444;line-height:1.6}

.spin-detail-block{padding:12px 14px}
.sdi{border-radius:7px;padding:8px 10px;margin-bottom:6px}
.sdi.ok{background:#f1f8e9;border:1px solid #c8e6c9}
.sdi.falta{background:#fffde7;border:1px solid #fff9c4}
.sdi.next{background:#fff8e1;border:1px solid #ffe082}
.sdi-h{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.sdi-l{font-size:12px;font-weight:800}
.sdi.ok .sdi-l{color:#2e7d32}
.sdi.falta .sdi-l,.sdi.next .sdi-l{color:#f57f17}
.sdi-badge{font-size:10px;font-weight:600;padding:1px 6px;border-radius:3px}
.sdi.ok .sdi-badge{background:#c8e6c9;color:#1b5e20}
.sdi.falta .sdi-badge,.sdi.next .sdi-badge{background:#fff9c4;color:#f57f17}
.sdi-name{font-size:10px;color:#999}
.sdi-text{font-size:11px;color:#555;line-height:1.4}
.sdi.next .sdi-text{color:#e65100}

/* ── TAB 3: PLAN ── */
.plan-block{padding:12px 14px;border-bottom:1px solid #eee}
.plan-sublabel{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:#bbb;margin-bottom:6px;margin-top:10px}
.plan-sublabel:first-child{margin-top:0}
.apertura-box{background:#e8eef7;border-radius:7px;padding:10px 12px;font-size:12px;color:#1a3a6b;line-height:1.6;margin-bottom:4px}
.cl-list{list-style:none}
.cl-item{border:1px solid #e4e2dc;border-radius:8px;padding:9px 11px;margin-bottom:6px;background:#fff}
.cl-punto{font-size:11px;font-weight:600;color:#003087;margin-bottom:3px;display:flex;gap:6px;align-items:flex-start}
.cl-punto::before{content:"";min-width:13px;height:13px;border:1.5px solid #003087;border-radius:3px;display:inline-block;margin-top:1px;flex-shrink:0}
.cl-pregunta{font-size:11px;color:#333;font-style:italic;margin-bottom:2px;padding-left:19px}
.cl-dato{font-size:10px;color:#bbb;padding-left:19px}
.msg-copy-box{background:#fff;border:1px solid #e4e2dc;border-radius:8px;padding:10px 12px;margin-bottom:6px}
.mc-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.mc-label{font-size:10px;color:#bbb;font-weight:600;text-transform:uppercase;letter-spacing:0.05em}
.btn-copy-sm{font-size:11px;font-weight:500;color:#003087;background:#e8eef7;border:none;border-radius:5px;padding:3px 9px;cursor:pointer}
.btn-copy-sm:hover{background:#d0ddef}
.mc-text{font-size:12px;color:#1a1a1a;line-height:1.5}
.planb-box{border-left:3px solid #ddd;padding:8px 11px;font-size:11px;color:#666;line-height:1.5;background:#f8f8f8;border-radius:0 6px 6px 0}

/* ── TAB 4: HISTORIAL ── */
.timeline-block{padding:12px 14px}
.tl-item{display:flex;gap:9px;margin-bottom:9px}
.tl-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:3px}
.d-ok{background:#4caf50}.d-no{background:#ff9800}.d-wp{background:#2196f3}
.d-ag{background:#9c27b0}.d-chat{background:#90a4ae}.d-update{background:#26a69a}
.tl-fecha{font-size:10px;color:#bbb}
.tl-texto{font-size:12px;color:#555;margin-top:1px;line-height:1.4}

/* CHAT */
.chat-panel{display:flex;flex-direction:column;overflow:hidden;background:#fff}
.chat-msgs{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:10px}
.chat-empty{margin:auto;text-align:center;padding:32px 20px;max-width:300px}
.ce-icon{font-size:32px;margin-bottom:8px}
.ce-text{font-size:13px;color:#999;line-height:1.6}
.ce-hints{margin-top:12px;display:flex;flex-direction:column;gap:5px}
.ce-hint{background:#f0efeb;border-radius:8px;padding:7px 11px;font-size:12px;color:#666;cursor:pointer;text-align:left;border:none;transition:background 0.12s}
.ce-hint:hover{background:#e4e2dc}
.msg{max-width:78%;display:flex;flex-direction:column}
.msg-user{align-self:flex-end}
.msg-bot{align-self:flex-start}
.bubble{padding:9px 13px;border-radius:16px;font-size:13px;line-height:1.55}
.msg-user .bubble{background:#003087;color:#fff;border-bottom-right-radius:4px}
.msg-bot .bubble{background:#f0efeb;color:#1a1a1a;border-bottom-left-radius:4px}
.msg-hora{font-size:10px;color:#ccc;margin-top:2px;padding:0 4px}
.msg-user .msg-hora{text-align:right}
.uchip{align-self:center;font-size:11px;font-weight:600;padding:4px 12px;border-radius:12px}
.chip-perfil{background:#e8f5e9;color:#2e7d32}
.chip-contacto{background:#e3f2fd;color:#0d47a1}
.typing .bubble{display:flex;gap:4px;align-items:center;padding:12px 15px}
.dot-t{width:6px;height:6px;border-radius:50%;background:#ccc;animation:bounce 1.2s infinite}
.dot-t:nth-child(2){animation-delay:0.2s}
.dot-t:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.chat-input-row{border-top:1px solid #eee;padding:10px 14px;display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
.chat-input{flex:1;border:1px solid #e0ddd6;border-radius:18px;padding:8px 14px;font-size:13px;font-family:inherit;outline:none;resize:none;max-height:100px;line-height:1.4;transition:border-color 0.15s;background:#fafaf8}
.chat-input:focus{border-color:#003087;background:#fff}
.send-btn{width:36px;height:36px;border-radius:50%;background:#003087;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.15s}
.send-btn:hover{background:#00256b}
.send-btn:disabled{background:#b0b8c8;cursor:not-allowed}
.send-btn svg{width:15px;height:15px;fill:#fff}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:500;display:flex;align-items:center;justify-content:center}
.modal-box{background:#fff;border-radius:12px;padding:22px;max-width:340px;width:90%}
.modal-title{font-size:15px;font-weight:700;margin-bottom:7px}
.modal-text{font-size:13px;color:#555;margin-bottom:18px;line-height:1.5}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.modal-cancel{background:#f0efeb;color:#555;border:1px solid #ddd;border-radius:7px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer}
.modal-confirm{color:#fff;border:none;border-radius:7px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer}
.mc-danger{background:#c00}
.mc-primary{background:#003087}

#loadingOverlay{position:fixed;inset:0;background:rgba(255,255,255,0.92);display:flex;align-items:center;justify-content:center;z-index:300}
.spinner{width:28px;height:28px;border:3px solid #eee;border-top-color:#003087;border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{font-size:12px;color:#bbb;font-style:italic;padding:4px 0}
</style>
</head>
<body>
<div id="loadingOverlay"><div class="spinner"></div></div>

<nav class="nav">
  <a class="nav-back" href="index.html">← Gestiones</a>
  <span class="nav-title" id="navTitle">Cargando...</span>
  <div class="nav-right">
    <div class="nav-score"><span class="n" id="navScore">—</span><span class="d">/25</span></div>
    <span class="nav-cl" id="navCl"></span>
  </div>
</nav>

<div class="main">
  <!-- PANEL IZQUIERDO -->
  <div class="panel">
    <!-- Header fijo -->
    <div class="lead-hdr">
      <div class="lead-hdr-left">
        <div class="avatar" id="avatar">?</div>
        <div>
          <div class="lead-nombre" id="leadNombre">—</div>
          <div class="lead-modelo" id="leadModelo">—</div>
        </div>
      </div>
      <div class="mgmt-btns">
        <button class="mb mb-def" onclick="clearChat()" title="Borrar chat">🗑</button>
        <button class="mb mb-def" onclick="deleteLastGestion()" title="Deshacer análisis">↩</button>
        <button class="mb mb-danger" onclick="confirmDeleteLead()" title="Eliminar lead">✕</button>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" id="tab-accion" onclick="switchTab('accion')">⚡ Acción</div>
      <div class="tab" id="tab-perfil" onclick="switchTab('perfil')">👤 Perfil</div>
      <div class="tab" id="tab-plan" onclick="switchTab('plan')">📋 Plan</div>
      <div class="tab" id="tab-historial" onclick="switchTab('historial')">🕐 Historial</div>
    </div>

    <!-- TAB ACCIÓN -->
    <div class="tab-content active" id="tc-accion">
      <div id="nextBlock"></div>
      <div id="diasChip"></div>
      <div class="spin-block">
        <div class="sb-title">Estado SPIN</div>
        <div class="spin-pills" id="spinPills"></div>
        <div id="spinNextBox"></div>
      </div>
    </div>

    <!-- TAB PERFIL -->
    <div class="tab-content" id="tc-perfil">
      <div class="score-block">
        <div class="score-row">
          <div>
            <div class="score-big" id="scoreBig">—</div>
            <div style="font-size:10px;color:#aaa;margin-top:3px">sobre 25 puntos</div>
          </div>
          <span class="cl-pill" id="clPill"></span>
        </div>
        <div id="scoreBars"></div>
      </div>
      <div class="diag-block">
        <div class="blk-title">
          <span>Diagnóstico</span>
          <div class="updated-dot" id="updatedDot"></div>
        </div>
        <div class="diag-text" id="diagText">—</div>
      </div>
      <div class="spin-detail-block">
        <div class="blk-title">Detalle SPIN</div>
        <div id="spinDetail"></div>
      </div>
    </div>

    <!-- TAB PLAN -->
    <div class="tab-content" id="tc-plan">
      <div class="plan-block" id="planContent"></div>
    </div>

    <!-- TAB HISTORIAL -->
    <div class="tab-content" id="tc-historial">
      <div class="timeline-block" id="timeline"></div>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat-panel">
    <div class="chat-msgs" id="chatMsgs">
      <div class="chat-empty" id="chatEmpty">
        <div class="ce-icon">💬</div>
        <div class="ce-text">El asistente ya conoce el análisis completo. Escribí lo que pasó o pedí lo que necesitás.</div>
        <div class="ce-hints">
          <button class="ce-hint" onclick="quickSend('¿Cuál es el próximo paso con este lead?')">¿Cuál es el próximo paso?</button>
          <button class="ce-hint" onclick="quickSend('Dame el mensaje de WhatsApp para contactar')">Generame el mensaje de WhatsApp</button>
          <button class="ce-hint" onclick="quickSend('Dame el guión para la llamada')">Dame el guión de llamada</button>
          <button class="ce-hint" onclick="quickSend('¿Qué falta para completar el SPIN?')">¿Qué falta en el SPIN?</button>
        </div>
      </div>
    </div>
    <div class="chat-input-row">
      <textarea class="chat-input" id="chatInput" placeholder="Escribí lo que pasó, preguntá algo, o pedí un mensaje..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="enviar()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const phone = params.get('phone');
let lead = null;
let perfilActualizado = false;
let activeTab = 'accion';

const barConfig = [
  {label:'Intención',key:'score_intencion',nk:'score_intencion_nota',cls:'b0'},
  {label:'Cap. de pago',key:'score_capacidad',nk:'score_capacidad_nota',cls:'b1'},
  {label:'Urgencia',key:'score_urgencia',nk:'score_urgencia_nota',cls:'b2'},
  {label:'Engagement',key:'score_engagement',nk:'score_engagement_nota',cls:'b3'},
  {label:'Fit producto',key:'score_fit',nk:'score_fit_nota',cls:'b4'}
];
const spinNames={S:'Situación',P:'Problema',I:'Implicación',N:'Need-Payoff'};
const tlMap={
  atendio:{d:'d-ok',t:'✓ Atendió'},
  no_atendio:{d:'d-no',t:'✗ No atendió'},
  respondio_wp:{d:'d-wp',t:'💬 Respondió WP'},
  agendo_visita:{d:'d-ag',t:'⭐ Agendó visita'}
};

function switchTab(tab) {
  activeTab = tab;
  ['accion','perfil','plan','historial'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
    document.getElementById('tc-'+t).classList.toggle('active', t===tab);
  });
}

async function init() {
  if (!phone) { location.href='index.html'; return; }
  try {
    const res = await fetch(`/api/lead?phone=${encodeURIComponent(phone)}`);
    const data = await res.json();
    if (!data.found) { location.href='index.html'; return; }
    lead = data.lead;
    renderPanel();
    renderChat();
  } catch { location.href='index.html'; }
  document.getElementById('loadingOverlay').style.display='none';
}

function getG() { return lead.gestiones?.[lead.gestiones.length-1] || {}; }

function renderPanel() {
  const g = getG();
  const score = lead.ultimo_score || 0;
  const iniciales = (lead.nombre||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();

  document.getElementById('avatar').textContent = iniciales;
  document.getElementById('leadNombre').textContent = lead.nombre||'—';
  document.getElementById('leadModelo').textContent = lead.modelo||'Modelo no definido';
  document.getElementById('navTitle').textContent = lead.nombre||'—';
  document.getElementById('navScore').textContent = score;

  const cls = score>=20?'score-hot':score>=14?'score-warm':score>=8?'score-cold':'score-dead';
  const clText = score>=20?'🔥 Caliente':score>=14?'🟡 Tibio':score>=8?'🔵 Frío':'⚫ Muy frío';
  const clBg = score>=20?'#ffebee':score>=14?'#fff8e1':score>=8?'#e3f2fd':'#f5f5f5';
  const clColor = score>=20?'#c62828':score>=14?'#f57f17':score>=8?'#1565c0':'#757575';

  const sb = document.getElementById('scoreBig');
  sb.textContent=score; sb.className='score-big '+cls;
  ['clPill','navCl'].forEach(id=>{
    const el=document.getElementById(id);
    el.textContent=clText; el.style.background=clBg; el.style.color=clColor;
  });

  // ── TAB ACCIÓN ──
  const canal = g.canal||'llamada';
  const msgTexto = canal==='whatsapp'
    ? (g.accion_si_responde_wp||g.accion_si_no_atiende||'')
    : (g.accion_si_no_atiende||'');
  const msgLabel = canal==='llamada' ? 'Si no atiende — WhatsApp de respaldo' : 'Mensaje sugerido';

  document.getElementById('nextBlock').innerHTML = `
    <div class="next-block">
      <div class="nb-label">Próximo paso</div>
      <div class="nb-canal">${canal==='llamada'?'📞 Llamada telefónica':'💬 WhatsApp'}</div>
      ${g.accion_objetivo?`<div class="nb-objetivo">${escHtml(g.accion_objetivo)}</div>`:''}
      ${msgTexto?`<div class="msg-box">
        <div class="msg-box-hdr">
          <span class="msg-box-lbl">${msgLabel}</span>
          <button class="btn-copy-white" onclick="copiarMsg()">Copiar</button>
        </div>
        <div class="msg-box-text" id="msgBoxText">${escHtml(msgTexto)}</div>
      </div>`:''}
    </div>`;

  // Días desde último contacto
  const ultimoContacto = lead.gestiones
    .map(gg=>gg.fecha_resultado||gg.fecha).filter(Boolean).sort().pop();
  if (ultimoContacto) {
    const dias = Math.floor((new Date()-new Date(ultimoContacto))/(1000*60*60*24));
    const color = dias<=2?'#2e7d32':dias<=7?'#f57f17':'#c62828';
    document.getElementById('diasChip').innerHTML =
      `<div class="dias-chip" style="color:${color};background:${color}11;border:1px solid ${color}33">
        🕐 ${dias===0?'Hoy':dias===1?'Ayer':`${dias} días`} desde último contacto
      </div>`;
  } else {
    document.getElementById('diasChip').innerHTML='';
  }

  // SPIN pills
  const siguiente = g.spin_siguiente||'';
  document.getElementById('spinPills').innerHTML = ['S','P','I','N'].map(l=>{
    const ok=g['spin_'+l.toLowerCase()]===true;
    const isNext=!ok&&l===siguiente;
    const cls2=ok?'sp-ok':isNext?'sp-next':'sp-falta';
    return `<div class="sp ${cls2}">
      <div class="sp-letter">${l}</div>
      <div class="sp-name">${spinNames[l].split('-')[0]}</div>
      <div class="sp-icon">${ok?'✓':isNext?'→':'○'}</div>
    </div>`;
  }).join('');

  const nextBox = document.getElementById('spinNextBox');
  if (siguiente) {
    const faltaText = g['spin_'+siguiente.toLowerCase()+'_falta']||'';
    nextBox.innerHTML = `<div class="next-step-box">
      <div class="nsb-title">→ ${spinNames[siguiente]} — pendiente</div>
      ${faltaText?`<div class="nsb-text">${escHtml(faltaText)}</div>`:''}
    </div>`;
  } else if (g.spin_n) {
    nextBox.innerHTML = `<div class="next-step-box" style="background:#e8f5e9;border:1px solid #a5d6a7">
      <div class="nsb-title" style="color:#2e7d32">✓ SPIN completo — proponer visita al salón</div>
    </div>`;
  } else {
    nextBox.innerHTML='';
  }

  // ── TAB PERFIL ──
  document.getElementById('scoreBars').innerHTML = barConfig.map(b=>{
    const val=g[b.key]||0, nota=g[b.nk]||'';
    return `<div class="bar-row">
      <div class="bar-label">${b.label}</div>
      <div class="bar-track"><div class="bar-fill ${b.cls}" style="width:${val*20}%"></div></div>
      <div class="bar-val">${val}</div>
    </div>${nota?`<div class="bar-nota">${escHtml(nota)}</div>`:''}`;
  }).join('');

  document.getElementById('diagText').textContent = g.diagnostico||'—';
  if (perfilActualizado) document.getElementById('updatedDot').style.display='block';

  document.getElementById('spinDetail').innerHTML = ['S','P','I','N'].map(l=>{
    const lk=l.toLowerCase(), ok=g['spin_'+lk]===true;
    const isNext=!ok&&l===siguiente;
    const texto=ok?(g['spin_'+lk+'_detalle']||'Info disponible'):(g['spin_'+lk+'_falta']||'Falta información');
    const badge=ok?'Cubierto':isNext?'Siguiente →':'Pendiente';
    return `<div class="sdi ${ok?'ok':isNext?'next':'falta'}">
      <div class="sdi-h">
        <span class="sdi-l">${l}</span>
        <span class="sdi-badge">${badge}</span>
        <span class="sdi-name">${spinNames[l]}</span>
      </div>
      <div class="sdi-text">${escHtml(texto)}</div>
    </div>`;
  }).join('');

  // ── TAB PLAN ──
  let planHTML = '';
  if (g.accion_apertura) {
    planHTML += `<div class="plan-sublabel">Apertura — 30 segundos</div>
      <div class="apertura-box">${escHtml(g.accion_apertura)}</div>`;
  }
  if (g.accion_checklist?.length) {
    planHTML += `<div class="plan-sublabel">Checklist de indagación</div><ul class="cl-list">`;
    g.accion_checklist.forEach(item=>{
      planHTML+=`<li class="cl-item">
        <div class="cl-punto">${escHtml(item.punto||'')}</div>
        <div class="cl-pregunta">"${escHtml(item.pregunta_sugerida||'')}"</div>
        <div class="cl-dato">Buscás saber: ${escHtml(item.dato_que_buscas||'')}</div>
      </li>`;
    });
    planHTML+=`</ul>`;
  }
  if (msgTexto) {
    planHTML += `<div class="plan-sublabel">${msgLabel}</div>
      <div class="msg-copy-box">
        <div class="mc-hdr">
          <span class="mc-label">Listo para copiar</span>
          <button class="btn-copy-sm" onclick="copiarMsg()">Copiar</button>
        </div>
        <div class="mc-text" id="msgCopyAlt">${escHtml(msgTexto)}</div>
      </div>`;
  }
  if (g.plan_b) {
    planHTML += `<div class="plan-sublabel">Plan B</div>
      <div class="planb-box">${escHtml(g.plan_b)}</div>`;
  }
  document.getElementById('planContent').innerHTML = planHTML ||
    '<div class="empty-state">Sin plan de acción disponible</div>';

  // ── TAB HISTORIAL ──
  const evs=[];
  (lead.gestiones||[]).forEach(gg=>{
    evs.push({f:gg.fecha?.split('T')[0],t:`Análisis (score ${gg.score}/25)`,d:'d-chat'});
    if (gg.resultado) {
      const r=tlMap[gg.resultado]||{d:'d-update',t:gg.resultado};
      evs.push({f:gg.fecha_resultado?.split('T')[0]||gg.fecha?.split('T')[0],
        t:r.t+(gg.notas_resultado?' — '+gg.notas_resultado:''),d:r.d});
    }
  });
  if (lead.ultimo_chat) evs.push({f:lead.ultimo_chat.split('T')[0],t:'Última conversación en chat',d:'d-update'});
  document.getElementById('timeline').innerHTML = evs.slice(-10).reverse().map(e=>
    `<div class="tl-item"><div class="tl-dot ${e.d}"></div>
    <div><div class="tl-fecha">${e.f||'—'}</div><div class="tl-texto">${e.t}</div></div></div>`
  ).join('') || '<div class="empty-state">Sin eventos registrados</div>';
}

function copiarMsg() {
  const el = document.getElementById('msgBoxText') || document.getElementById('msgCopyAlt');
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).then(()=>{
    document.querySelectorAll('.btn-copy-white,.btn-copy-sm').forEach(b=>{
      b.textContent='¡Copiado!'; setTimeout(()=>b.textContent='Copiar',2000);
    });
  });
}

function renderChat() {
  const h=lead.chat_history||[];
  if (!h.length) return;
  const c=document.getElementById('chatMsgs');
  c.innerHTML='';
  h.forEach(m=>appendBubble(m.role,m.content,m.fecha));
  c.scrollTop=c.scrollHeight;
}

function appendBubble(role,content,fecha) {
  const c=document.getElementById('chatMsgs');
  document.getElementById('chatEmpty')?.remove();
  const div=document.createElement('div');
  div.className=`msg msg-${role==='user'?'user':'bot'}`;
  const hora=fecha?new Date(fecha).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}):'';
  div.innerHTML=`<div class="bubble">${role==='user'?escHtml(content):renderMd(content)}</div><div class="msg-hora">${hora}</div>`;
  c.appendChild(div);
  c.scrollTop=c.scrollHeight;
}

function showChip(text,cls) {
  const c=document.getElementById('chatMsgs');
  const div=document.createElement('div');
  div.className=`uchip ${cls}`;
  div.textContent=text;
  c.appendChild(div); c.scrollTop=c.scrollHeight;
}

function showTyping() {
  const c=document.getElementById('chatMsgs');
  const div=document.createElement('div');
  div.className='msg msg-bot typing'; div.id='typingDot';
  div.innerHTML=`<div class="bubble"><div class="dot-t"></div><div class="dot-t"></div><div class="dot-t"></div></div>`;
  c.appendChild(div); c.scrollTop=c.scrollHeight;
}
function hideTyping(){document.getElementById('typingDot')?.remove();}

async function enviar() {
  const input=document.getElementById('chatInput');
  const msg=input.value.trim();
  if (!msg||!phone) return;
  input.value=''; input.style.height='auto';
  document.getElementById('sendBtn').disabled=true;
  appendBubble('user',msg,new Date().toISOString());
  showTyping();

  try {
    const res=await fetch('/api/chat',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({phone,mensaje:msg})
    });
    const data=await res.json();
    hideTyping();

    if (data.respuesta) {
      appendBubble('assistant',data.respuesta,data.fecha);

      if (data.registro_contacto) {
        const labels={atendio:'✓ Atendió registrado',no_atendio:'✗ No atendió registrado',
          respondio_wp:'💬 Respuesta registrada',agendo_visita:'⭐ Visita agendada'};
        showChip(labels[data.registro_contacto]||'Contacto registrado','chip-contacto');
        const g=getG();
        if (g) {
          g.resultado=data.registro_contacto;
          g.notas_resultado=data.notas_contacto||msg.substring(0,80);
          g.fecha_resultado=data.fecha;
        }
        lead.ultimo_resultado=data.registro_contacto;
        renderPanel();
      }

      if (data.perfil_actualizado&&data.lead_actualizado) {
        const lu=data.lead_actualizado;
        const g=getG();
        Object.keys(lu).forEach(k=>{
          if (lu[k]!==null&&lu[k]!==undefined) {
            if (k==='score') lead.ultimo_score=lu[k];
            else if (k==='modelo') lead.modelo=lu[k];
            else g[k]=lu[k];
          }
        });
        perfilActualizado=true;
        renderPanel();
        showChip('↑ Perfil actualizado','chip-perfil');
        // Auto-cambiar a tab acción para ver el update
        switchTab('accion');
      }

      if (!lead.chat_history) lead.chat_history=[];
      lead.chat_history.push({role:'user',content:msg,fecha:new Date().toISOString()});
      lead.chat_history.push({role:'assistant',content:data.respuesta,fecha:data.fecha});
    } else {
      appendBubble('assistant','Error al procesar.',new Date().toISOString());
    }
  } catch {
    hideTyping();
    appendBubble('assistant','Error de red.',new Date().toISOString());
  }
  document.getElementById('sendBtn').disabled=false;
  document.getElementById('chatInput').focus();
}

async function callManage(action,extra={}) {
  try {
    const res=await fetch('/api/delete-lead',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({phone,action,...extra})});
    return res.json();
  } catch {return{ok:false};}
}

function showModal(title,text,confirmText,fn,isDanger=true) {
  const o=document.createElement('div');
  o.className='modal-overlay';
  o.innerHTML=`<div class="modal-box">
    <div class="modal-title">${title}</div>
    <div class="modal-text">${text}</div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="this.closest('.modal-overlay').remove()">Cancelar</button>
      <button class="modal-confirm ${isDanger?'mc-danger':'mc-primary'}" id="mcBtn">${confirmText}</button>
    </div>
  </div>`;
  document.body.appendChild(o);
  o.querySelector('#mcBtn').onclick=async()=>{o.remove();await fn();};
}

async function confirmDeleteLead() {
  showModal('Eliminar lead',`¿Eliminar a <strong>${lead.nombre}</strong>? No se puede deshacer.`,'Eliminar',
    async()=>{await callManage('delete_lead');location.href='index.html';});
}
async function deleteLastGestion() {
  showModal('Deshacer análisis','Se borra el análisis más reciente.','Deshacer',async()=>{
    await callManage('delete_last_gestion');
    lead.gestiones.pop();
    if (lead.gestiones.length>0) lead.ultimo_score=lead.gestiones[lead.gestiones.length-1].score||0;
    renderPanel();
  },false);
}
async function clearChat() {
  showModal('Borrar chat','Se borra la conversación. El análisis se mantiene.','Borrar',async()=>{
    await callManage('clear_chat');
    lead.chat_history=[];
    const c=document.getElementById('chatMsgs');
    c.innerHTML=`<div class="chat-empty" id="chatEmpty">
      <div class="ce-icon">💬</div>
      <div class="ce-text">Chat borrado. El análisis del lead se mantiene.</div>
      <div class="ce-hints">
        <button class="ce-hint" onclick="quickSend('¿Cuál es el próximo paso?')">¿Cuál es el próximo paso?</button>
        <button class="ce-hint" onclick="quickSend('Dame el mensaje de WhatsApp')">Mensaje de WhatsApp</button>
      </div>
    </div>`;
  },false);
}

function quickSend(t){document.getElementById('chatInput').value=t;enviar();}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();enviar();}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function renderMd(s){return escHtml(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');}

init();
</script>
